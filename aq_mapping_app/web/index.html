<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Log air-quality readings with GPS during the UTSC lab.">
  <meta name="theme-color" content="#009688">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AQ Mapper">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AQ Mapper</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Simple branded splash shown while the app downloads on first load. */
    #boot { position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #E0F2F1;
      font-family: -apple-system, Roboto, Helvetica, Arial, sans-serif;
      color: #00695C; }
    #boot img { width: 96px; height: 96px; margin-bottom: 16px; }
    #boot .t { font-size: 18px; font-weight: 600; }
    #boot .s { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="boot">
    <img src="icons/Icon-192.png" alt="AQ Mapper">
    <div class="t">AQ Mapper</div>
    <div class="s">Loading…</div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Remove the boot splash once Flutter has rendered its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var b = document.getElementById('boot');
      if (b) b.remove();
    });
  </script>
</body>
</html>
